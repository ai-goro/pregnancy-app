<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>赤ちゃん週数アプリ 🌸</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-deep:   #e8829a;
    --pink-mid:    #f4a6bb;
    --pink-light:  #fce4ec;
    --beige:       #fdf6f0;
    --beige-dark:  #f5e6d8;
    --brown-soft:  #c49a84;
    --text-main:   #5c3d4e;
    --text-sub:    #9b7287;
    --white:       #ffffff;
    --shadow:      rgba(220,150,170,0.25);
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(160deg, #fce4ec 0%, #fdf6f0 50%, #fce4ec 100%);
    min-height: 100vh;
    color: var(--text-main);
    padding-bottom: 40px;
  }

  /* ─── HEADER ─── */
  .app-header {
    background: linear-gradient(135deg, var(--pink-deep), #d4789a);
    padding: 20px 16px 24px;
    text-align: center;
    position: relative;
    border-radius: 0 0 32px 32px;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .app-header h1 {
    font-size: 1.4rem;
    color: white;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .app-header .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 0.78rem;
    margin-top: 4px;
    letter-spacing: 0.08em;
  }
  .header-deco {
    position: absolute;
    top: 10px; right: 14px;
    font-size: 1.6rem;
    opacity: 0.6;
  }

  /* ─── WEEK SELECTOR ─── */
  .week-selector-wrap {
    padding: 20px 16px 0;
  }
  .week-selector-card {
    background: white;
    border-radius: 20px;
    padding: 18px 20px;
    box-shadow: 0 4px 18px var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .week-label {
    font-size: 0.8rem;
    color: var(--text-sub);
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }
  .week-display {
    flex: 1;
    text-align: center;
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--pink-deep);
    line-height: 1;
  }
  .week-display span {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-sub);
  }
  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
    color: white;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(228,130,154,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { transform: scale(0.92); box-shadow: 0 1px 6px rgba(228,130,154,0.3); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  /* Progress dots */
  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    padding: 0 16px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--beige-dark);
    transition: all 0.3s;
  }
  .dot.active {
    background: var(--pink-deep);
    width: 24px;
    border-radius: 4px;
  }

  /* ─── FETUS CARD ─── */
  .fetus-card {
    margin: 16px 16px 0;
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 4px 18px var(--shadow);
  }
  .fetus-header {
    background: linear-gradient(135deg, #fce4ec, #fdf6f0);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .fetus-svg-wrap {
    width: 100px; height: 100px;
    background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.9), rgba(252,228,236,0.5));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(232,130,154,0.2);
  }
  .fetus-svg-wrap svg { width: 72px; height: 72px; }
  .fetus-info { flex: 1; }
  .fetus-week-label {
    font-size: 0.75rem;
    color: var(--text-sub);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .fetus-size-text {
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--pink-deep);
    margin: 4px 0 2px;
    line-height: 1.3;
  }
  .fetus-mm {
    font-size: 0.78rem;
    color: var(--text-sub);
    font-weight: 500;
  }
  .fetus-desc {
    padding: 14px 20px 18px;
    font-size: 0.88rem;
    color: var(--text-sub);
    line-height: 1.65;
    border-top: 1px dashed var(--beige-dark);
  }

  /* ─── INFO CARDS ─── */
  .section-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-sub);
    padding: 18px 16px 8px;
    text-transform: uppercase;
  }
  .info-card {
    margin: 0 16px 14px;
    background: white;
    border-radius: 20px;
    padding: 16px 18px;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .info-card-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 12px;
  }
  .info-card-title .icon-badge {
    width: 30px; height: 30px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .badge-health { background: #fce4ec; }
  .badge-food   { background: #e8f5e9; }

  .advice-item {
    display: flex;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--beige-dark);
    align-items: flex-start;
  }
  .advice-item:last-child { border-bottom: none; padding-bottom: 0; }
  .advice-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .badge-food-num {
    background: linear-gradient(135deg, #a5d6a7, #66bb6a) !important;
  }
  .advice-text {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text-main);
  }
  .advice-text strong {
    color: var(--pink-deep);
    font-weight: 700;
  }
  .food-text strong {
    color: #5a9e5f;
  }

  /* ─── INPUT MODE ─── */
  .input-toggle-wrap {
    text-align: center;
    margin-top: 4px;
  }
  .input-toggle {
    background: none; border: none;
    color: var(--text-sub);
    font-size: 0.78rem;
    text-decoration: underline;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .week-input-row {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .week-input-row.visible { display: flex; }
  .week-select {
    width: 100%;
    max-width: 200px;
    padding: 10px 16px;
    border-radius: 12px;
    border: 2px solid var(--pink-mid);
    font-size: 1.1rem;
    color: var(--text-main);
    background: white;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }

  /* ─── ANIMATION ─── */
  .fetus-svg-wrap svg {
    animation: heartbeat 2s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .fade-in {
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── FOOTER ─── */
  .app-footer {
    text-align: center;
    padding: 24px 16px 10px;
    font-size: 0.72rem;
    color: var(--brown-soft);
    line-height: 1.6;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">

      </div>
      <div class="week-input-row" id="inputRow">
        <select class="week-select" id="weekSelect" onchange="selectWeek(this.value)">
          <option value="8">妊娠8週</option>
          <option value="9">妊娠9週</option>

    <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">›</button>
  </div>

  <!-- Progress dots -->
  <div class="progress-dots" id="progressDots"></div>
</div>

<!-- FETUS CARD -->
<div class="fetus-card fade-in" id="fetusCard">

    <div class="fetus-svg-wrap" id="fetusSvgWrap"></div>

      <div class="fetus-mm" id="fetusMm"></div>
    </div>
  </div>
  <div class="fetus-desc" id="fetusDesc"></div>
</div>

<!-- HEALTH ADVICE -->
<div class="section-title">💗 今週の体調管理</div>
<div class="info-card">
  <div class="info-card-title">
    <div class="icon-badge badge-health">🩺</div>
    今週の体調アドバイス
  </div>
  <div id="healthAdvice"></div>
</div>

<!-- NUTRITION -->
<div class="section-title">🥦 今週の栄養・食事</div>
<div class="info-card">
  <div class="info-card-title">
    <div class="icon-badge badge-food">🍽️</div>
    積極的に摂りたい栄養
  </div>
  <div id="nutritionAdvice"></div>
</div>

<!-- FOOTER -->
<div class="app-footer">
  ※ このアプリの情報は一般的なガイドラインに基づくものです。<br>
  体調の変化や不安なことは、必ず担当医に相談してください。
</div>

// ════════════════════════════════════════
// STATE & RENDER
// ════════════════════════════════════════
const MIN_WEEK = 8, MAX_WEEK = 12;
let currentWeek = 8;
let inputVisible = false;

function render() {
  const d = weekData[currentWeek];

  // Week display
  document.getElementById('weekDisplay').innerHTML = `${currentWeek}<span> 週</span>`;

  // Progress dots
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  for (let w = MIN_WEEK; w <= MAX_WEEK; w++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (w === currentWeek ? ' active' : '');
    dots.appendChild(dot);
  }

  // Buttons
  document.getElementById('prevBtn').disabled = (currentWeek === MIN_WEEK);
  document.getElementById('nextBtn').disabled = (currentWeek === MAX_WEEK);

  // Select sync
  document.getElementById('weekSelect').value = currentWeek;

  // Fetus card - animate
  const card = document.getElementById('fetusCard');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');

  document.getElementById('fetusWeekLabel').textContent = d.label;
  document.getElementById('fetusSvgWrap').innerHTML = d.svg;
  document.getElementById('fetusSizeText').textContent = d.sizeTitle;
  document.getElementById('fetusMm').textContent = d.sizeMm;
  document.getElementById('fetusDesc').textContent = d.desc;

  // Health advice
  const ha = document.getElementById('healthAdvice');
  ha.innerHTML = d.health.map((h, i) => `
    <div class="advice-item">
      <div class="advice-num">${i+1}</div>
      <div class="advice-text">${h.text}</div>
    </div>
  `).join('');

  // Nutrition
  const na = document.getElementById('nutritionAdvice');
  na.innerHTML = d.nutrition.map((n, i) => `
    <div class="advice-item">
      <div class="advice-num badge-food-num">${i+1}</div>
      <div class="advice-text food-text">${n.text}</div>
    </div>
  `).join('');
}

function changeWeek(delta) {
  const next = currentWeek + delta;
  if (next < MIN_WEEK || next > MAX_WEEK) return;
  currentWeek = next;
  render();
}

function selectWeek(val) {
  currentWeek = parseInt(val);
  render();
}

function toggleInput() {
  inputVisible = !inputVisible;
  const row = document.getElementById('inputRow');
  row.classList.toggle('visible', inputVisible);
}

// Init
render();
